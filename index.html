<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMG Installs — YTD 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root { color-scheme: light; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  padding: 24px;
  max-width: 1100px;
  margin: 0 auto;
}
.header {
  text-align: center;
  margin-bottom: 28px;
}
.header h1 {
  font-size: 26px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 4px;
}
.header .subtitle {
  font-size: 14px;
  color: #6c757d;
}
.kpi-row {
  display: flex;
  gap: 14px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.kpi-card {
  flex: 1;
  min-width: 140px;
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.kpi-card .value {
  font-size: 32px;
  font-weight: 700;
  color: #1a1a2e;
}
.kpi-card .label {
  font-size: 11px;
  color: #6c757d;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-top: 6px;
}
.card {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.card h2 {
  font-size: 16px;
  font-weight: 600;
  color: #1a1a2e;
  margin-bottom: 18px;
}
.chart-container {
  position: relative;
  width: 100%;
  height: 480px;
}
.chart-container-monthly {
  position: relative;
  width: 100%;
  height: 340px;
}
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 7px 16px;
  border: 1px solid #dee2e6;
  border-radius: 8px;
  background: #fff;
  color: #495057;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.tab-btn:hover { background: #f8f9fa; }
.tab-btn.active {
  background: #9B72CF;
  color: #fff;
  border-color: #9B72CF;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 2px solid #dee2e6;
  color: #6c757d;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid #f0f0f0;
}
tr:hover td { background: #f8f9fa; }
.rank { color: #6c757d; font-weight: 600; }
.rep-name { font-weight: 600; }
.installs-val { font-weight: 700; color: #1a1a2e; }
.bar-cell { width: 40%; }
.bar-bg {
  height: 22px;
  border-radius: 5px;
  background: linear-gradient(90deg, #D5AF34, #E5C96A);
  transition: width 0.6s ease;
}
.partner-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.partner-tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 5px;
  background: #e9ecef;
  color: #495057;
  white-space: nowrap;
}
.footer {
  text-align: center;
  font-size: 12px;
  color: #adb5bd;
  margin-top: 20px;
  padding: 12px 0;
}
@media (max-width: 700px) {
  body { padding: 14px; }
  .kpi-card { min-width: 100px; padding: 14px; }
  .kpi-card .value { font-size: 24px; }
  .chart-container { height: 400px; }
  .bar-cell { display: none; }
  th, td { padding: 8px 6px; font-size: 12px; }
}
</style>
</head>

    return '<tr><td class="rank">'+(i+1)+'</td><td class="rep-name">'+r.rep+'</td>'+cells+'<td class="installs-val">'+r.installs+'</td></tr>';
  }).join('');
  document.getElementById('tableContainer').innerHTML = '<table><thead><tr>'+header+'</tr></thead><tbody>'+rows+'</tbody></table>';
}

function renderPartners() {
  var rows = repData.map(function(r, i) {
    var partners = partnerByRep[r.rep] || {};
    var tags = Object.entries(partners)
      .sort(function(a,b){ return b[1]-a[1]; })
      .map(function(e){ return '<span class="partner-tag">'+e[0]+' ('+e[1]+')</span>'; })
      .join('');
    return '<tr><td class="rank">'+(i+1)+'</td><td class="rep-name">'+r.rep+'</td><td class="installs-val">'+r.installs+'</td><td><div class="partner-tags">'+tags+'</div></td></tr>';
  }).join('');
  document.getElementById('tableContainer').innerHTML = '<table><thead><tr><th>#</th><th>Rep</th><th>Total</th><th>ISP Partners</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    var view = btn.getAttribute('data-view');
    if (view === 'overview') renderOverview();
    else if (view === 'monthly') renderMonthly();
    else if (view === 'partners') renderPartners();
  });
});

renderOverview();
</script>
</body>
</html>
